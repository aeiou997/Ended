name: ended
description: "Know when enough is enough. — Track your short-form video addiction."

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  
  # Local Database
  shared_preferences: ^2.2.3
  
  # Charts
  fl_chart: ^0.69.0
  
  # Notifications
  flutter_local_notifications: ^17.2.4
  
  # Background Work
  workmanager: ^0.5.2
  flutter_foreground_task: ^6.1.0
  
  # Android Usage Stats
  usage_stats: ^1.2.0
  
  # Permissions
  permission_handler: ^11.3.1
  app_settings: ^5.1.1
  
  # UI Utilities
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  percent_indicator: ^4.2.3
  intl: ^0.19.0
  path_provider: ^2.1.4
  share_plus: ^9.0.0
  
  # Export
  csv: ^6.0.0
  
  # Icons
  cupertino_icons: ^1.0.8
  material_design_icons_flutter: ^7.0.7296

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true
