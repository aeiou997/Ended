<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Ended - Know when enough is enough. Social media addiction tracker for short-form video counting.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Ended">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Ended — Know when enough is enough</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { background-color: #0F172A; margin: 0; padding: 0; }
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #3B82F6;
    }
    #loading .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #1E293B;
      border-top: 4px solid #3B82F6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    #loading .title {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    #loading .tagline {
      font-size: 14px;
      color: #64748B;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div class="title">Ended</div>
    <div class="tagline">Know when enough is enough</div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
